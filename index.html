<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GuilTeach — Aprende sobre el audio</title>
  <meta name="description" content="Colección de micrositios GuilTeach para aprender sobre el audio.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',sans-serif;
      min-height:100vh;
      background:#f5f0e8 url('bg.jpg') center/cover fixed;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .overlay{
      min-height:100vh;
      width:100%;
      background:rgba(245,240,232,0.55);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:40px 20px 80px;
    }
    .wrapper{
      max-width:900px;
      width:100%;
      text-align:center;
    }
    h1{
      font-family:'Caveat',cursive;
      font-size:54px;
      font-weight:600;
      color:#1a1a1a;
      letter-spacing:-1px;
      line-height:1.1;
      text-shadow:1px 2px 0 rgba(255,255,255,0.6);
    }
    .subtitle{
      font-size:15px;
      color:#444;
      margin:10px 0 36px;
      font-weight:400;
    }
    .folders{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:28px;
    }
    .folder-btn{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      cursor:pointer;
      background:none;
      border:none;
      padding:0;
      text-decoration:none;
      transition:transform .18s ease;
    }
    .folder-btn:hover{
      transform:translateY(-6px) scale(1.06);
    }
    .folder-icon{
      width:120px;
      height:100px;
      filter:drop-shadow(0 4px 10px rgba(60,110,180,0.25));
    }
    .folder-label{
      font-family:'Caveat',cursive;
      font-size:18px;
      font-weight:600;
      color:#1a1a1a;
      text-align:center;
      max-width:130px;
      line-height:1.3;
      text-shadow:0 1px 3px rgba(255,255,255,0.7);
    }
    footer{
      position:fixed;
      bottom:0;
      width:100%;
      text-align:center;
      padding:12px;
      font-size:12px;
      color:#555;
      background:rgba(245,240,232,0.7);
      backdrop-filter:blur(4px);
    }

    /* ── Modal ── */
    .modal-overlay{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      backdrop-filter:blur(4px);
      z-index:100;
      align-items:flex-end;
      justify-content:center;
    }
    .modal-overlay.open{
      display:flex;
      animation:fadeIn .2s ease;
    }
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .modal-panel{
      background:#fff;
      border-radius:20px 20px 0 0;
      width:100%;
      max-width:700px;
      max-height:80vh;
      overflow-y:auto;
      padding:28px 28px 40px;
      animation:slideUp .25s ease;
    }
    @keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:20px;
    }
    .modal-title{
      font-family:'Caveat',cursive;
      font-size:28px;
      font-weight:600;
      color:#1a1a1a;
    }
    .modal-close{
      background:none;
      border:none;
      font-size:24px;
      cursor:pointer;
      color:#888;
      padding:4px 8px;
      border-radius:8px;
      transition:background .15s;
    }
    .modal-close:hover{background:#f0f0f0}
    .tool-list{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
      gap:12px;
      list-style:none;
    }
    .tool-item a{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      background:#f5f8ff;
      border:1.5px solid #d0e0f8;
      border-radius:12px;
      text-decoration:none;
      color:#1a3a6e;
      font-size:14px;
      font-weight:600;
      transition:all .15s ease;
      gap:8px;
    }
    .tool-item a:hover{
      background:#e0edff;
      border-color:#5090e0;
      transform:translateY(-2px);
      box-shadow:0 4px 12px rgba(60,110,200,0.15);
    }
    .tool-item a span.arrow{color:#5090e0;font-size:16px;flex-shrink:0}
  </style>
</head>
<body>
  <div class="overlay">
    <div class="wrapper">
      <header>
        <h1>GuilTeach</h1>
        <p class="subtitle">Selecciona un área para explorar sus herramientas interactivas</p>
      </header>
      <div class="folders">

        <button class="folder-btn" onclick="openModal('acustica')">
          <svg class="folder-icon" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g1a" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a8d8f0"/><stop offset="100%" style="stop-color:#6aafe0"/></linearGradient>
              <linearGradient id="g1b" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#88c4ec"/><stop offset="100%" style="stop-color:#4e96cc"/></linearGradient>
            </defs>
            <path d="M5 32 Q5 26 11 26 L44 26 Q48 26 50 22 L56 14 Q58 10 63 10 L109 10 Q115 10 115 16 L115 32 Z" fill="url(#g1a)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="url(#g1b)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="rgba(255,255,255,0.13)"/>
          </svg>
          <span class="folder-label">Acústica Arquitectónica</span>
        </button>

        <button class="folder-btn" onclick="openModal('ajustes')">
          <svg class="folder-icon" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g2a" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a8d8f0"/><stop offset="100%" style="stop-color:#6aafe0"/></linearGradient>
              <linearGradient id="g2b" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#88c4ec"/><stop offset="100%" style="stop-color:#4e96cc"/></linearGradient>
            </defs>
            <path d="M5 32 Q5 26 11 26 L44 26 Q48 26 50 22 L56 14 Q58 10 63 10 L109 10 Q115 10 115 16 L115 32 Z" fill="url(#g2a)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="url(#g2b)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="rgba(255,255,255,0.13)"/>
          </svg>
          <span class="folder-label">Ajustes de Equipos de Sonido</span>
        </button>

        <button class="folder-btn" onclick="openModal('fundamentos')">
          <svg class="folder-icon" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g3a" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a8d8f0"/><stop offset="100%" style="stop-color:#6aafe0"/></linearGradient>
              <linearGradient id="g3b" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#88c4ec"/><stop offset="100%" style="stop-color:#4e96cc"/></linearGradient>
            </defs>
            <path d="M5 32 Q5 26 11 26 L44 26 Q48 26 50 22 L56 14 Q58 10 63 10 L109 10 Q115 10 115 16 L115 32 Z" fill="url(#g3a)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="url(#g3b)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="rgba(255,255,255,0.13)"/>
          </svg>
          <span class="folder-label">Fundamentos del Sonido</span>
        </button>

        <button class="folder-btn" onclick="openModal('djs')">
          <svg class="folder-icon" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g4a" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a8d8f0"/><stop offset="100%" style="stop-color:#6aafe0"/></linearGradient>
              <linearGradient id="g4b" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#88c4ec"/><stop offset="100%" style="stop-color:#4e96cc"/></linearGradient>
            </defs>
            <path d="M5 32 Q5 26 11 26 L44 26 Q48 26 50 22 L56 14 Q58 10 63 10 L109 10 Q115 10 115 16 L115 32 Z" fill="url(#g4a)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="url(#g4b)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="rgba(255,255,255,0.13)"/>
          </svg>
          <span class="folder-label">Herramientas para DJ's</span>
        </button>

        <button class="folder-btn" onclick="openModal('instalaciones')">
          <svg class="folder-icon" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="g5a" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#a8d8f0"/><stop offset="100%" style="stop-color:#6aafe0"/></linearGradient>
              <linearGradient id="g5b" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#88c4ec"/><stop offset="100%" style="stop-color:#4e96cc"/></linearGradient>
            </defs>
            <path d="M5 32 Q5 26 11 26 L44 26 Q48 26 50 22 L56 14 Q58 10 63 10 L109 10 Q115 10 115 16 L115 32 Z" fill="url(#g5a)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="url(#g5b)" stroke="#4080b0" stroke-width="1.5"/>
            <rect x="5" y="30" width="110" height="64" rx="7" fill="rgba(255,255,255,0.13)"/>
          </svg>
          <span class="folder-label">Instalaciones de Equipos de Sonido</span>
        </button>

      </div>
    </div>
  </div>

  <footer>© <span id="yr"></span> GuilTeach — Aprende sobre el audio</footer>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeOnBg(event)">
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <ul class="tool-list" id="toolList"></ul>
    </div>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    const BASE = 'https://guil-collab.github.io/web-guilteach';
    const CATS = {
      acustica: {
        label: 'Acústica Arquitectónica',
        folder: 'Acústica Arquitectónica',
        tools: ['Curvas NC y NR','Modos de Resonancia']
      },
      ajustes: {
        label: 'Ajustes de Equipos de Sonido',
        folder: 'Ajustes de Equipos de Sonido',
        tools: ['Configuraciones de Subwoofer','Crossovers','Curva de Fase II','curva de fase I','Filtro Peine','Ordenes de Filtros','Suma de dos Fuentes identicas','Tabla Desfase por Delay']
      },
      fundamentos: {
        label: 'Fundamentos del Sonido',
        folder: 'Fundamentos del sonido',
        tools: ['Atomo y Movimiendo armónico Simple','Atomos y Onda I','Atomos y Onda II','Fase y Grados ','Onda 2 Armónicos','Onda 3 Armónicos','Visualizador de Desfases']
      },
      djs: {
        label: "Herramientas para DJ's",
        folder: "Herramientas para DJ´s",
        tools: ['Asistente para Pinchar Con Vinilo','Calculadora Transpoción de Samples','Rueda de Camelot']
      },
      instalaciones: {
        label: 'Instalaciones de Equipos de Sonido',
        folder: 'Instalaciones de Equipos de Sonido',
        tools: ['Ejercicios de Amplificar de Potencia']
      }
    };

    function openModal(id) {
      const cat = CATS[id];
      document.getElementById('modalTitle').textContent = cat.label;
      const list = document.getElementById('toolList');
      list.innerHTML = cat.tools.map(t => {
        const url = BASE + '/' + encodeURIComponent(cat.folder) + '/' + encodeURIComponent(t) + '.html';
        return '<li class="tool-item"><a href="' + url + '" target="_blank" rel="noopener"><span>' + t + '</span><span class="arrow">↗</span></a></li>';
      }).join('');
      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function closeOnBg(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
